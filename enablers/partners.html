<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partners — Fortude Repository</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <nav class="global-nav">
        <div class="nav-top">
            <a href="../index.html" class="nav-brand"><span class="brand-f">F</span>ortude Repository</a>
            <input type="text" class="nav-search" placeholder="Search collateral...">
        </div>
        <div class="nav-tabs">
            <a href="../practices/index.html" class="nav-tab">Practices</a>
            <a href="index.html" class="nav-tab active">Enablers</a>
        </div>
    </nav>

    <div class="breadcrumb">
        <a href="../index.html">Home</a>
        <span>/</span>
        <a href="index.html">Enablers</a>
        <span>/</span>
        <span>Partners</span>
    </div>

    <section class="hero">
        <div class="hero-content">
            <a href="index.html" class="hero-back">← Back to Enablers</a>
            <div class="hero-eyebrow">Enabler — Partners</div>
            <h1 style="display:flex;align-items:center;gap:12px;">
                <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-bottom:2px;"></span>
                Partners
            </h1>
            <p>Partner programme collateral, co-sell resources and alliance management materials</p>
        </div>
    </section>

    <div class="sub-tabs-bar">
        <div class="sub-tab active" onclick="switchTab(this,'partner-programme')">Partner Programme</div>
        <div class="sub-tab" onclick="switchTab(this,'co-sell')">Co-sell Resources</div>
        <div class="sub-tab" onclick="switchTab(this,'alliance')">Alliance Management</div>
    </div>

    <div class="sub-panel active" id="panel-partner-programme"><div class="container"><div class="cards-grid"></div></div></div>
    <div class="sub-panel" id="panel-co-sell"><div class="container"><div class="cards-grid"></div></div></div>
    <div class="sub-panel" id="panel-alliance"><div class="container"><div class="cards-grid"></div></div></div>

    <footer class="footer">
        <p>&copy; 2026 Fortude. Knowledge Repository v2.0</p>
    </footer>

    <script>
    function switchTab(el, panel) {
        document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('panel-' + panel).classList.add('active');
    }
    </script>
</body>
</html>
